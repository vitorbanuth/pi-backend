services:
  mongodb:
    image: mongo:latest
    container_name: pi_mongodb
    ports:
      - "27018:27018"
    volumes:
      - mongodb_data:/data/db
    command: ["--port", "27018"]
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: pi_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongodb:27018/"
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
