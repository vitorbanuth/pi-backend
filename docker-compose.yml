services:
  mongodb:
    image: mongo:latest
    container_name: pi_mongodb
    ports:
      - "27018:27018"
    volumes:
      - mongodb_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018", "--quiet"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/rs_inited || (mongosh --port 27018 --quiet --eval \"try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27018'}]}) }\" && touch /tmp/rs_inited)"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: pi_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongodb:27018/?directConnection=true"
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
